<!DOCTYPE html>
<html>
<head>
  <title>Astranova AI Assistant</title>
  <style>
    body {
      width: 350px;
      min-height: 400px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    
    .api-section {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .api-input {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 12px;
      margin-bottom: 8px;
    }
    
    .api-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    
    .save-btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 4px;
      background: #007AFF;
      color: white;
      font-weight: 500;
      cursor: pointer;
    }
    
    .save-btn:hover {
      background: #0056CC;
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .action-btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .action-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .action-btn .icon {
      font-size: 20px;
    }
    
    .action-btn .text {
      flex: 1;
    }
    
    .action-btn .title {
      font-weight: 600;
      margin-bottom: 2px;
    }
    
    .action-btn .description {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .status {
      margin-top: 16px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }
    
    .status.success {
      background: rgba(76, 175, 80, 0.2);
      color: #A5D6A7;
    }
    
    .status.error {
      background: rgba(244, 67, 54, 0.2);
      color: #EF9A9A;
    }
    
    .status.info {
      background: rgba(33, 150, 243, 0.2);
      color: #90CAF9;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Astranova AI Assistant</h1>
  </div>
  
  <div class="api-section">
    <input 
      type="password" 
      id="apiKey" 
      class="api-input" 
      placeholder="Enter OpenAI API Key (sk-...)"
    />
    <button id="saveKey" class="save-btn">Save API Key</button>
  </div>
  
  <div class="actions">
    <button id="summarizeBtn" class="action-btn">
      <span class="icon">📄</span>
      <div class="text">
        <div class="title">Summarize Page</div>
        <div class="description">AI-powered page summary</div>
      </div>
    </button>
    
    <button id="analyzeBtn" class="action-btn">
      <span class="icon">🔍</span>
      <div class="text">
        <div class="title">Analyze Content</div>
        <div class="description">Page structure analysis</div>
      </div>
    </button>
    
    <button id="web3Btn" class="action-btn">
      <span class="icon">💎</span>
      <div class="text">
        <div class="title">Web3 Tools</div>
        <div class="description">Wallet balance checker</div>
      </div>
    </button>
    
    <button id="openBrowser" class="action-btn">
      <span class="icon">🌐</span>
      <div class="text">
        <div class="title">Open Astranova Browser</div>
        <div class="description">Full AI browser experience</div>
      </div>
    </button>
  </div>
  
  <div id="status" class="status info">
    Ready to assist your browsing
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
